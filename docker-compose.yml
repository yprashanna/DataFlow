version: "3.9"

# DataFlow — all services share the same image, different CMD overrides.
# SQLite data is stored in a named volume so it persists across restarts.

services:

  api:
    build:
      context: .
      target: runtime
    container_name: dataflow_api
    ports:
      - "8000:8000"
    volumes:
      - dataflow_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env.example
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  scheduler:
    build:
      context: .
      target: runtime
    container_name: dataflow_scheduler
    volumes:
      - dataflow_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env.example
    command: python -m orchestrator.scheduler
    depends_on:
      - api
    restart: unless-stopped

  dashboard:
    build:
      context: .
      target: runtime
    container_name: dataflow_dashboard
    ports:
      - "8501:8501"
    volumes:
      - dataflow_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env.example
    command: streamlit run ui/app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    depends_on:
      - api
    restart: unless-stopped

volumes:
  dataflow_data:
    driver: local
