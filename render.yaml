services:
  - type: web
    name: dataflow-api
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt && python generate_sample_data.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true
